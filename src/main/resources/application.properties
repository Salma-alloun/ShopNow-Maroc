# ===============================
# DATABASE
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/mydbspring?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.servlet.context-path=/WebMVCRepo-master
spring.jackson.serialization.fail-on-empty-beans=false
# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
spring.thymeleaf.servlet.content-type=text/html
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=classpath:/static/
# ===============================
# STATIC RESOURCES (optionnel)
# ===============================
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/static/**
# Configuration pour les uploads d'images
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/
# ===============================
# SERVER (optionnel)
# ===============================
server.port=8080
server.servlet.context-path=/WebMVCRepo-master
server.error.include-message=always
server.error.include-binding-errors=always
logging.level.ma.fstm.ilisi.projects.webmvc=DEBUG
logging.level.org.springframework.web=DEBUG

