<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta id="ctx" th:content="@{/}" content="/">
    <title>Confirmation - E-Shop Maroc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; }
        .confirmation-container {
            max-width: 650px;
            margin: 3rem auto;
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .success-icon {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, #28a745, #20c997);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            animation: popIn 0.5s ease;
        }
        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
        .success-icon i { font-size: 2.5rem; color: white; }
        h2 { color: #28a745; font-weight: 700; margin-bottom: 0.5rem; }
        .subtitle { color: #888; margin-bottom: 2rem; }
        .order-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 1.5rem;
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .order-card .label { color: #888; font-size: 0.9rem; }
        .order-card .value { font-weight: 600; color: #333; }
        .order-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff9900;
        }
        .total-paid {
            font-size: 1.4rem;
            font-weight: 700;
            color: #28a745;
        }
        .items-list {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .items-list .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .items-list .item-row:last-child { border-bottom: none; }
        .item-name { font-weight: 500; color: #333; }
        .item-qty  { color: #888; font-size: 0.9rem; }
        .item-price { font-weight: 600; color: #ff9900; }
        .status-badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: #d4edda;
            color: #155724;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .btn-continue {
            background: linear-gradient(135deg, #667eea, #ff9900);
            border: none;
            border-radius: 12px;
            padding: 0.9rem 2rem;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            margin: 0.5rem;
        }
        .btn-continue:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
            color: white;
        }
        .btn-orders {
            background: white;
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 0.9rem 2rem;
            color: #667eea;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            margin: 0.5rem;
        }
        .btn-orders:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="confirmation-container">
    <!-- Icône succès -->
    <div class="success-icon">
        <i class="fas fa-check"></i>
    </div>
    <h2>Paiement confirmé !</h2>
    <p class="subtitle">Merci pour votre commande. Vous recevrez une confirmation par email.</p>
    <!-- Récapitulatif commande -->
    <div class="order-card">
        <div class="row mb-3">
            <div class="col-6">
                <div class="label">Numéro de commande</div>
                <div class="order-number">#<span th:text="${commande.id}"></span></div>
            </div>
            <div class="col-6 text-end">
                <div class="label">Statut</div>
                <span class="status-badge">
                    <i class="fas fa-check-circle me-1"></i> PAYÉE
                </span>
            </div>
        </div>
        <div class="row">
            <div class="col-6">
                <div class="label">Date</div>
                <div class="value" th:text="${#dates.format(commande.orderDate, 'dd/MM/yyyy HH:mm')}"></div>
            </div>
            <div class="col-6 text-end">
                <div class="label">Total payé</div>
                <div class="total-paid"
                     th:text="${#numbers.formatDecimal(commande.total, 1, 2)} + ' DH'"></div>
            </div>
        </div>
    </div>
    <!-- Liste des articles -->
    <div class="items-list" th:if="${commande.orderItems != null and !commande.orderItems.isEmpty()}">
        <div class="item-row" th:each="item : ${commande.orderItems}">
            <div>
                <div class="item-name" th:text="${item.productName}">Produit</div>
                <div class="item-qty">Quantité : <span th:text="${item.quantity}"></span></div>
            </div>
            <div class="item-price"
                 th:text="${#numbers.formatDecimal(item.subtotal, 1, 2)} + ' DH'"></div>
        </div>
    </div>
    <!-- Boutons -->
    <div class="mt-3">
        <a th:href="@{/catalogue}" class="btn-continue">
            <i class="fas fa-shopping-bag"></i>
            Continuer mes achats
        </a>
        <a th:href="@{/commande/mes-commandes}" class="btn-orders">
            <i class="fas fa-list"></i>
            Mes commandes
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
